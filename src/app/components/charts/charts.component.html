<div class="charts-container">
  <div class="charts-grid">
    <div class="chart-card">
      <h5>Trafic par région</h5>
      <div class="chart-wrapper">
        <canvas baseChart 
          [data]="barChartData" 
          [options]="barChartOptions"
          type="bar">
        </canvas>
      </div>
    </div>

    <div class="chart-card">
      <h5>Évolution du trafic</h5>
      <div class="chart-wrapper">
        <canvas baseChart 
          [data]="lineChartData" 
          [options]="lineChartOptions"
          type="line">
        </canvas>
      </div>
    </div>
  </div>
</div>
